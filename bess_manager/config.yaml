name: "BESS Manager (Beta)"
description: "Battery Energy Storage System optimization and management"
version: "9.9.0b8"
slug: "bess_manager_beta"
image: "ghcr.io/johanzander/bess-manager-beta-{arch}"
init: false
arch:
  - aarch64
  - amd64
startup: application
boot: auto
ports:
  8080/tcp: 8080
ingress: true
ingress_port: 8080
panel_icon: mdi:battery-charging
panel_title: BESS Manager
panel_admin: true
hassio_api: true
homeassistant_api: true
auth_api: true
options:
  influxdb:
    url: "http://homeassistant.local:8086/api/v2/query"
    bucket: "home_assistant/autogen"
    username: "your_db_username_here"
    password: "your_db_password_here"
schema:
  influxdb:
    url: str
    bucket: str
    username: str
    password: str
